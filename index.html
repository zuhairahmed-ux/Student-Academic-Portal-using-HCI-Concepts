<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shareef EduPortal — Student Portal System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&family=Orbitron:wght@400;600;800;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css.css">
</head>
<body>
<!-- STARFIELD -->
<canvas id="stars-canvas"></canvas>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="portal-title">SHAREEF EDUPORTAL</div>
    <div class="portal-sub">Student Academic Gateway</div>

    <div class="owl-container" id="owl-container">
      <svg class="owl-svg" id="owl-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="bodyGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#2a2a4a"/>
            <stop offset="100%" stop-color="#0d0d1e"/>
          </radialGradient>
          <radialGradient id="bellyGrad" cx="50%" cy="40%" r="50%">
            <stop offset="0%" stop-color="#3a3a5e"/>
            <stop offset="100%" stop-color="#1a1a30"/>
          </radialGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Graduation Gown -->
        <path d="M60 120 Q50 170 55 195 Q100 205 145 195 Q150 170 140 120 Z" fill="#1a0a2e" stroke="#4a1a7a" stroke-width="1"/>
        <path d="M70 125 Q65 165 68 190" stroke="#6a2a9a" stroke-width="1" fill="none" opacity="0.5"/>
        <path d="M130 125 Q135 165 132 190" stroke="#6a2a9a" stroke-width="1" fill="none" opacity="0.5"/>
        <path d="M72 122 Q100 135 128 122" stroke="#00f5ff" stroke-width="1.5" fill="none" opacity="0.6"/>
        <!-- Hat & tassel -->
        <ellipse cx="100" cy="62" rx="52" ry="9" fill="#111" stroke="#333" stroke-width="1"/>
        <rect x="72" y="18" width="56" height="46" rx="4" fill="#0a0a0a" stroke="#222" stroke-width="1"/>
        <rect x="72" y="55" width="56" height="8" rx="2" fill="none" stroke="#00f5ff" stroke-width="1" opacity="0.5"/>
        <rect x="72" y="56" width="56" height="6" rx="2" fill="rgba(0,245,255,0.05)"/>
        <line x1="128" y1="25" x2="138" y2="45" stroke="#ffd700" stroke-width="1.5"/>
        <circle cx="138" cy="46" r="3" fill="#ffd700"/>
        <line x1="138" y1="49" x2="136" y2="62" stroke="#ffd700" stroke-width="1"/>
        <line x1="138" y1="49" x2="140" y2="63" stroke="#ffd700" stroke-width="1"/>
        <line x1="138" y1="49" x2="143" y2="60" stroke="#ffd700" stroke-width="1"/>
        <!-- Body & Belly -->
        <ellipse cx="100" cy="135" rx="42" ry="48" fill="url(#bodyGrad)" stroke="#2a2a4a" stroke-width="1.5"/>
        <ellipse cx="100" cy="138" rx="26" ry="32" fill="url(#bellyGrad)"/>
        <path d="M82 115 Q86 120 82 125" stroke="#3a3a5e" stroke-width="1" fill="none"/>
        <path d="M88 112 Q92 117 88 122" stroke="#3a3a5e" stroke-width="1" fill="none"/>
        <path d="M112 115 Q116 120 112 125" stroke="#3a3a5e" stroke-width="1" fill="none"/>
        <path d="M118 112 Q114 117 118 122" stroke="#3a3a5e" stroke-width="1" fill="none"/>
        <!-- Head -->
        <ellipse cx="100" cy="100" rx="38" ry="36" fill="url(#bodyGrad)" stroke="#2a2a4a" stroke-width="1.5"/>
        <path d="M70 80 L64 62 L76 72 Z" fill="#1a1a30" stroke="#2a2a4a" stroke-width="1"/>
        <path d="M130 80 L136 62 L124 72 Z" fill="#1a1a30" stroke="#2a2a4a" stroke-width="1"/>
        <!-- Eye rings -->
        <circle id="eye-ring-l" cx="86" cy="98" r="15" fill="#0d0d20" stroke="#00f5ff" stroke-width="1.5" filter="url(#glow)"/>
        <circle id="eye-ring-r" cx="114" cy="98" r="15" fill="#0d0d20" stroke="#00f5ff" stroke-width="1.5" filter="url(#glow)"/>
        <!-- Open eyes -->
        <g id="eye-l">
          <circle id="sclera-l" cx="86" cy="98" r="11" fill="#eef0ff"/>
          <circle id="iris-l" cx="86" cy="98" r="7" fill="#2a5fff"/>
          <circle id="pupil-l" cx="86" cy="98" r="4" fill="#000"/>
          <circle id="shine-l" cx="89" cy="95" r="1.5" fill="rgba(255,255,255,0.9)"/>
        </g>
        <g id="eye-r">
          <circle id="sclera-r" cx="114" cy="98" r="11" fill="#eef0ff"/>
          <circle id="iris-r" cx="114" cy="98" r="7" fill="#2a5fff"/>
          <circle id="pupil-r" cx="114" cy="98" r="4" fill="#000"/>
          <circle id="shine-r" cx="117" cy="95" r="1.5" fill="rgba(255,255,255,0.9)"/>
        </g>
        <!-- Eyelids -->
        <g id="eyelid-l" display="none">
          <ellipse cx="86" cy="98" rx="11" ry="11" fill="#1a1a30" stroke="#2a2a4a" stroke-width="1"/>
          <path d="M75 98 Q86 104 97 98" fill="#151525" stroke="#3a3a5e" stroke-width="1"/>
          <text x="79" y="93" font-size="7" fill="#00f5ff" font-family="Orbitron" opacity="0.8">z</text>
          <text x="82" y="88" font-size="5" fill="#00f5ff" font-family="Orbitron" opacity="0.6">z</text>
        </g>
        <g id="eyelid-r" display="none">
          <ellipse cx="114" cy="98" rx="11" ry="11" fill="#1a1a30" stroke="#2a2a4a" stroke-width="1"/>
          <path d="M103 98 Q114 104 125 98" fill="#151525" stroke="#3a3a5e" stroke-width="1"/>
          <text x="107" y="93" font-size="7" fill="#00f5ff" font-family="Orbitron" opacity="0.8">z</text>
          <text x="110" y="88" font-size="5" fill="#00f5ff" font-family="Orbitron" opacity="0.6">z</text>
        </g>
        <!-- Beak -->
        <path d="M96 108 L100 116 L104 108 Z" fill="#ffd700" stroke="#cc9900" stroke-width="0.5"/>
        <!-- Wings -->
        <ellipse cx="62" cy="140" rx="18" ry="30" fill="#111122" stroke="#2a2a3a" stroke-width="1" transform="rotate(-10,62,140)"/>
        <ellipse cx="138" cy="140" rx="18" ry="30" fill="#111122" stroke="#2a2a3a" stroke-width="1" transform="rotate(10,138,140)"/>
        <!-- Feet -->
        <path d="M82 180 L76 192 M82 180 L82 192 M82 180 L88 192" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
        <path d="M118 180 L112 192 M118 180 L118 192 M118 180 L124 192" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
        <!-- Aura -->
        <circle cx="100" cy="100" r="40" fill="none" stroke="#00f5ff" stroke-width="0.5" opacity="0.15"/>
        <circle cx="100" cy="100" r="48" fill="none" stroke="#00f5ff" stroke-width="0.3" opacity="0.07"/>
      </svg>
    </div>

    <div class="login-card-owl">
      <div class="role-grid">
        <div class="role-btn active" onclick="selectRole('student',this)"><span class="role-icon">👨‍🎓</span>Student</div>
        <div class="role-btn" onclick="selectRole('teacher',this)"><span class="role-icon">👩‍🏫</span>Teacher</div>
        <div class="role-btn" onclick="selectRole('admin',this)"><span class="role-icon">🛠️</span>Admin</div>
      </div>
      <div class="field-group">
        <label class="field-label">Student ID / Email</label>
        <div class="field-wrap"><input type="text" class="field-input" id="login-user" placeholder="Enter your student ID" autocomplete="off"></div>
      </div>
      <div class="field-group">
        <label class="field-label">Portal Password</label>
        <div class="field-wrap">
          <input type="password" class="field-input" id="login-pass" placeholder="••••••••">
          <span class="pw-toggle" id="pw-toggle" title="Show/hide password">👁</span>
        </div>
      </div>
      <button class="btn-login" id="login-btn">⚡ ACCESS PORTAL</button>
      <p class="login-hint-owl">🔒 Select a role and click Access Portal · Owl guardian watches over your session</p>
    </div>
  </div>
</div>

<div class="owl-toast" id="owl-toast">✨ System ready</div>

<div id="portal">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo"><div class="logo-icon">🎓</div><div>Shareef <span>EduPortal</span></div></div>
    </div>
    <div class="sidebar-user">
      <div class="avatar" id="sb-avatar">SA</div>
      <div class="user-info">
        <div class="name" id="sb-name">Sarah Ahmed</div>
        <div class="role" id="sb-role">Student</div>
      </div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer">
      <div class="logout-btn" onclick="doLogout()"><span>↩</span> Sign out</div>
    </div>
  </div>
  <div class="main-content" id="main-content"></div>
</div>

<div id="toast"></div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Modal</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title" id="conf-title">Are you sure?</div>
    <div class="confirm-msg" id="conf-msg">This action cannot be undone.</div>
    <div class="confirm-actions">
      <button class="btn btn-outline" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="conf-ok">Delete</button>
    </div>
  </div>
</div>

<script src="js/starfield.js" defer></script>
<script src="js/owl.js" defer></script>
<script src="js/data.js" defer></script>
<script src="js/login.js" defer></script>
<script src="js/portal-utils.js" defer></script>
<script src="js/portal-pages.js" defer></script>
<script src="js/main.js" defer></script>
</body>
</html>
